<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Verification | Srivriddhi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
<script src="/svr-env.js"></script>
<script src="/svr-shared.js"></script>
<style>
  :root {
    --brand: #D4A017;
    --brand-dark: #B3860B;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --text-light: #666666;
    --border: #E5E5E0;
    --success: #2E7D32;
    --success-bg: #E8F5E9;
    --error: #C62828;
    --error-bg: #FFEBEE;
  }
  body {
    margin: 0; padding: 0; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .container {
    width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box;
  }
  .card {
    background: var(--surface); border-radius: 16px; padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border);
  }
  .header {
    text-align: center; margin-bottom: 32px;
  }
  .logo {
    width: 64px; height: 64px;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo img {
    width: 100%; height: 100%; object-fit: contain;
  }
  .title {
    font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700;
    color: var(--text); margin: 0 0 8px;
  }
  .subtitle {
    font-size: 13px; color: var(--text-light); margin: 0; line-height: 1.5;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block; font-size: 12px; font-weight: 700; color: var(--text-light);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-control {
    width: 100%; padding: 14px 16px; box-sizing: border-box;
    border: 2px solid var(--border); border-radius: 8px; font-size: 15px;
    font-family: inherit; transition: all 0.2s; background: #fff;
  }
  .form-control:focus {
    outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(212,160,23,0.1);
  }
  .captcha-box {
    display: flex; align-items: center; gap: 12px; background: #f5f5f5;
    padding: 12px; border-radius: 8px; border: 1px solid var(--border);
  }
  .captcha-question {
    font-weight: 700; font-size: 16px; color: var(--text); white-space: nowrap;
    user-select: none;
    background: #fff; padding: 10px 14px; border-radius: 6px; border: 1px dashed var(--brand);
    min-width: 70px; text-align: center;
  }
  .btn {
    width: 100%; padding: 16px; background: var(--brand); color: white;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; font-family: 'Montserrat', sans-serif;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  
  .result-box {
    margin-top: 32px; padding: 24px; border-radius: 12px; display: none;
  }
  .result-box.success {
    display: block; background: var(--success-bg); border: 1px solid #c8e6c9;
  }
  .result-box.error {
    display: block; background: var(--error-bg); border: 1px solid #ffcdd2;
  }
  .result-icon {
    font-size: 32px; margin-bottom: 12px; text-align: center;
  }
  .result-title {
    font-weight: 700; font-size: 18px; text-align: center; margin: 0 0 16px;
  }
  .success .result-title { color: var(--success); }
  .error .result-title { color: var(--error); }
  
  .meta-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  .meta-item {
    font-size: 13px; display: flex; flex-direction: column; gap: 4px;
    background: rgba(255,255,255,0.5); padding: 8px 12px; border-radius: 6px;
  }
  .meta-label { color: var(--text-light); font-size: 11px; text-transform: uppercase; font-weight: 700;}
  .meta-val { font-weight: 600; color: var(--text); word-break: break-all;}
  
  .loader {
    display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #999; }
</style>
</head>

      <h1 class="title">Authenticity Verification</h1>
      <p class="subtitle">Enter the Document ID below or scan the QR code to verify its source.</p>
    </div>
    
    <div id="form-section">
      <div class="form-group">
        <label>Document ID</label>
        <input type="text" id="doc-id" class="form-control" placeholder="e.g. SVE-2026-APT-0001" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label>Security Check (Prevent Bots)</label>
        <div class="captcha-box">
          <span class="captcha-question" id="captcha-q"></span>
          <input type="number" id="captcha-a" class="form-control" placeholder="Answer" style="padding: 10px;" autocomplete="off">
        </div>
      </div>
      
      <button class="btn" id="verify-btn" onclick="verifyDoc()">
        <span id="btn-text">Verify Document</span>
        <div class="loader" id="btn-loader"></div>
      </button>
    </div>
    
    <div id="result" class="result-box">
      <div class="result-icon" id="res-icon"></div>
      <h3 class="result-title" id="res-title"></h3>
      <div class="meta-grid" id="res-meta"></div>
      <button class="btn" style="margin-top:20px; background: #fff; color: var(--text); border: 2px solid var(--border);" onclick="resetForm()">Verify Another</button>
    </div>
  </div>
  <div class="footer">
    &copy; <script>document.write(new Date().getFullYear())</script> Srivriddhi Enterprise. All rights reserved.<br>
    This portal is securely connected to the core database.
  </div>
</div>

<script>
  let expectedAnswer = 0;
  
  function generateCaptcha() {
    const num1 = Math.floor(Math.random() * 9) + 1;
    const num2 = Math.floor(Math.random() * 9) + 1;
    expectedAnswer = num1 + num2;
    document.getElementById('captcha-q').textContent = `${num1} + ${num2} = ?`;
    document.getElementById('captcha-a').value = '';
  }

  window.onload = () => {
    generateCaptcha();
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    if(id) {
      document.getElementById('doc-id').value = id;
      document.getElementById('captcha-a').focus();
    }
  };

  document.getElementById('captcha-a').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyDoc();
  });

  async function verifyDoc() {
    const docId = document.getElementById('doc-id').value.trim();
    const answer = parseInt(document.getElementById('captcha-a').value);
    
    if(!docId) return alert('Please enter a Document ID.');
    if(answer !== expectedAnswer) {
      alert('Incorrect security check answer. Please try again.');
      generateCaptcha();
      document.getElementById('captcha-a').focus();
      return;
    }

    document.getElementById('btn-text').style.display = 'none';
    document.getElementById('btn-loader').style.display = 'block';
    document.getElementById('verify-btn').disabled = true;

    try {
      // Direct REST call to Supabase using Anon key (Public Read)
      const url = window.__SVR_ENV ? window.__SVR_ENV.url : '';
      const anonKey = window.__SVR_ENV ? window.__SVR_ENV.anon : '';
      
      if(!url || !anonKey) {
        throw new Error("Database configuration missing.");
      }

      const res = await fetch(`${url}/rest/v1/documents?id=eq.${encodeURIComponent(docId)}&select=id,date,status,to_name,subject,issued_by`, {
        headers: {
          "apikey": anonKey,
          "Content-Type": "application/json"
        }
      });
      
      const data = await res.json();
      
      document.getElementById('form-section').style.display = 'none';
      const resultBox = document.getElementById('result');
      const meta = document.getElementById('res-meta');
      
      // Helper: safely set text (XSS-safe, no innerHTML for user data)
      function safeText(el, text) {
        el.textContent = text || 'N/A';
      }
      function setMetaField(label, value) {
        const item = document.createElement('div');
        item.className = 'meta-item';
        const lbl = document.createElement('span');
        lbl.className = 'meta-label';
        lbl.textContent = label;
        const val = document.createElement('span');
        val.className = 'meta-val';
        val.textContent = value || 'N/A';
        item.appendChild(lbl);
        item.appendChild(val);
        return item;
      }

      if(res.ok && data && data.length > 0) {
        const doc = data[0];
        resultBox.className = 'result-box success';
        document.getElementById('res-icon').textContent = '✅';
        document.getElementById('res-title').textContent = 'Genuine & Verified';
        
        const dateStr = doc.date ? new Date(doc.date).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}) : 'N/A';
        
        // Security warning banner (safe static HTML)
        meta.innerHTML = `
          <div style="background: #FFF3E0; border: 1px solid #FFE0B2; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
            <div style="color: #E65100; font-weight: bold; font-size: 11px; text-transform: uppercase; margin-bottom: 4px;">⚠️ Security Alert</div>
            <div style="color: #E65100; font-size: 12px; line-height: 1.4;">Cross-check the details below with the physical document. If they do not match EXACTLY, the physical document is a forgery.</div>
          </div>
          <div id="meta-fields-container" class="meta-grid"></div>
        `;
        // Append fields safely using textContent (not innerHTML)
        const container = document.getElementById('meta-fields-container');
        container.appendChild(setMetaField('Document No', doc.id));
        container.appendChild(setMetaField('Date of Issue', dateStr));
        container.appendChild(setMetaField('Prepared For', doc.to_name));
        container.appendChild(setMetaField('Subject', doc.subject));
        container.appendChild(setMetaField('Issued By', doc.issued_by));
        const statusItem = setMetaField('System Status', doc.status ? doc.status.toUpperCase() : 'VALID');
        statusItem.querySelector('.meta-val').style.cssText = 'color:var(--success); font-weight:700;';
        container.appendChild(statusItem);
      } else {
        // DB returned no results — document is NOT verified
        resultBox.className = 'result-box error';
        document.getElementById('res-icon').textContent = '❌';
        document.getElementById('res-title').textContent = 'Verification Failed';
        meta.innerHTML = '';
        const p = document.createElement('p');
        p.style.cssText = 'text-align:center; font-size:13px; color:var(--text-light); margin:0;';
        p.textContent = 'The document ID "' + docId + '" could not be verified in the secure database. It may be invalid, revoked, or incorrectly typed.';
        meta.appendChild(p);
      }
    } catch(err) {
      console.error('Verification Error:', err);
      // SECURITY: Network errors must show FAILURE — never trust localStorage as genuine
      document.getElementById('form-section').style.display = 'none';
      const resultBox = document.getElementById('result');
      const meta = document.getElementById('res-meta');
      resultBox.className = 'result-box error';
      document.getElementById('res-icon').textContent = '⚠️';
      document.getElementById('res-title').textContent = 'Cannot Verify — Network Error';
      meta.innerHTML = `
        <p style="text-align:center; font-size:13px; color:var(--text-light); margin:0 0 12px;">
          Unable to reach the verification server. Please check your internet connection and try again.
        </p>
        <p style="text-align:center; font-size:12px; color:#c62828; margin:0; font-weight:600;">
